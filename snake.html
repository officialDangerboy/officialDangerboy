<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D4NG3R's Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000000;
            font-family: 'Courier New', monospace;
            color: #00FF41;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #00FF41;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00FF41;
            font-size: 2em;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: #00FF41;
            font-size: 1.2em;
        }

        canvas {
            border: 3px solid #00FF41;
            background-color: #000000;
            display: block;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }

        .controls {
            color: #00FF41;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #00FF41;
            color: #000000;
            border: 2px solid #00FF41;
            cursor: pointer;
            margin: 5px;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #000000;
            color: #00FF41;
            box-shadow: 0 0 10px #00FF41;
        }

        button:active {
            transform: scale(0.95);
        }

        .status {
            color: #FF0000;
            font-size: 1.2em;
            margin-top: 10px;
        }

        .instructions {
            color: #00FF41;
            margin-top: 20px;
            font-size: 0.9em;
            border-top: 2px solid #00FF41;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 D4NG3R's SNAKE GAME 🐍</h1>
        
        <div class="game-info">
            <div>Score: <span id="score">0</span></div>
            <div>High Score: <span id="highScore">0</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button onclick="toggleGame()">▶ Start/Pause</button>
            <button onclick="resetGame()">⟲ Reset</button>
        </div>

        <div class="status" id="status">Press Start to Begin</div>

        <div class="instructions">
            <p><strong>Controls:</strong> Arrow Keys or WASD to move</p>
            <p>Eat the red food 🔴 to grow. Don't hit the walls or yourself!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [
            {x: 10, y: 10}
        ];
        
        let food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
        };
        
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gameLoop;
        
        document.getElementById('highScore').textContent = highScore;
        
        function drawGame() {
            // Clear canvas
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw snake
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#00FF41';
                    ctx.shadowColor = '#00FF41';
                    ctx.shadowBlur = 10;
                } else {
                    ctx.fillStyle = '#00AA22';
                    ctx.shadowBlur = 5;
                }
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
            ctx.shadowBlur = 0;
            
            // Draw food
            ctx.fillStyle = '#FF0000';
            ctx.shadowColor = '#FF0000';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function updateGame() {
            direction = nextDirection;
            
            const head = {
                x: (snake[0].x + direction.x + tileCount) % tileCount,
                y: (snake[0].y + direction.y + tileCount) % tileCount
            };
            
            // Check collision with self
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }
            
            snake.unshift(head);
            
            // Check if food is eaten
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } else {
                snake.pop();
            }
            
            drawGame();
        }
        
        function toggleGame() {
            if (!gameRunning) {
                gameRunning = true;
                document.getElementById('status').textContent = '▶ GAME RUNNING';
                gameLoop = setInterval(updateGame, 100);
            } else {
                gameRunning = false;
                clearInterval(gameLoop);
                document.getElementById('status').textContent = '⏸ PAUSED';
            }
        }
        
        function resetGame() {
            clearInterval(gameLoop);
            snake = [{x: 10, y: 10}];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            gameRunning = false;
            document.getElementById('score').textContent = score;
            document.getElementById('status').textContent = 'Press Start to Begin';
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            drawGame();
        }
        
        function endGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
                document.getElementById('status').textContent = `🏆 GAME OVER! NEW HIGH SCORE: ${score}`;
            } else {
                document.getElementById('status').textContent = `💀 GAME OVER! Score: ${score}`;
            }
        }
        
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (key === 'arrowup' || key === 'w') {
                if (direction.y === 0) nextDirection = {x: 0, y: -1};
                e.preventDefault();
            } else if (key === 'arrowdown' || key === 's') {
                if (direction.y === 0) nextDirection = {x: 0, y: 1};
                e.preventDefault();
            } else if (key === 'arrowleft' || key === 'a') {
                if (direction.x === 0) nextDirection = {x: -1, y: 0};
                e.preventDefault();
            } else if (key === 'arrowright' || key === 'd') {
                if (direction.x === 0) nextDirection = {x: 1, y: 0};
                e.preventDefault();
            }
        });
        
        // Initial draw
        drawGame();
    </script>
</body>
</html>
